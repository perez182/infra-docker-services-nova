version: '3.8'
services:
  customer-service:
    build: ../customer-service
    ports:
      - "8082:8082"

  order-service:
    build: ../order-service
    ports:
      - "8083:8083"

  order-management-service:
    build: ../order-management-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker